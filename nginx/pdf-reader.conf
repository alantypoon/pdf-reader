# ============================================================
# pdf-reader – included from ai-edu.dedyn.io.conf
# Authentication is handled by the parent server block via
# /__dse_auth_check (FastCGI → /var/www/html/auth-login/dse-auth-check.php)
# ============================================================

    location = /pdf-reader     { return 301 /pdf-reader/; }
    location /pdf-reader/ {
        auth_request            /__dse_auth_check;
        error_page              401 = @dse_login;
        alias /var/www/html/pdf-reader/dist/;
        index index.html;
        try_files $uri $uri/ @pdf-reader-spa;
    }
    location @pdf-reader-spa {
        # Only serve index.html for navigation routes (no file extension)
        if ($uri ~ \.[a-z0-9]+$) {
            return 404;
        }
        rewrite .* /pdf-reader/index.html break;
    }

    # pdf-reader API
    location /pdf-reader/api/ {
        auth_request            /__dse_auth_check;
        error_page              401 = @dse_login;
        proxy_pass              http://localhost:3001/api/;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        Cookie $http_cookie;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }

    # pdf-reader data (PDF files)
    location /pdf-reader/data/ {
        auth_request            /__dse_auth_check;
        error_page              401 = @dse_login;
        proxy_pass              http://localhost:3001/data/;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        Cookie $http_cookie;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }
